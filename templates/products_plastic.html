<!-- PRODUCT SIDEBAR -->
<div id="productSidebar" class="product-sidebar">
    <div class="sidebar-content">
        <span id="sidebarClose" class="close-btn">&times;</span>

        <!-- PRODUCT VIEW -->
        <div id="productView">
            <img id="sidebarImage" src="" alt="Product Image">
            <h2 id="sidebarName"></h2>
            <p id="sidebarCode"></p>

            <button id="sidebarInquireBtn" class="inquire-btn">
                Inquire
            </button>
        </div>

        <!-- INQUIRY FORM (HIDDEN INITIALLY) -->
        <div id="inquiryForm" style="display:none;">
            <h3>Product Inquiry</h3>
            
            <form id="productInquiryForm">
                <input type="text" name="hp" id="inqHp" style="display:none">
                
                <input type="text" id="inqProduct" placeholder="Product Name" required readonly>

                <input type="text" id="inqName" placeholder="Your Name" required>

                <input type="text" id="inqContact" placeholder="Contact Number" required>

                <input type="email" id="inqEmail" placeholder="Email Address" required>

                <textarea id="inqMessage" placeholder="Message" required></textarea>

                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>

    </div>
</div>

<!-- DARK OVERLAY -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>
