{%- extends "web.html" -%}

{%- block head %} 
{{ super() }}
<!-- Use the same forgot CSS for consistent design -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{%- endblock %}

{%- block page_content %}
<div class="custom-forgot-page">
    <div class="forgot-right">
        <div class="brand">
            <div class="brand-logos">
                <img src="{{ url_for('static', filename='images/QC.png') }}" alt="QC Logo" class="brand-logo">
                <img src="{{ url_for('static', filename='images/MC.png') }}" alt="MC Logo" class="brand-logo">
            </div>
            <h1>Reset Your Password</h1>
        </div>

        <form id="reset-form">
            <div class="form-row">
                <label for="email">Email</label>
                <span class="input-icon">
                    <i class="fa-solid fa-envelope"></i>
                </span>
                <input id="email" name="email" type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Reset Password</button>
                <button type="button" class="btn back-login" onclick="window.location.href='/login'">Back to Login</button>
            </div>
        </form>
    </div>
</div>
{%- endblock %}

{% block footer %}
<div class="custom-footer">
    Copyright © 2025 QC Styropackaging & Multiplast Corporation | Powered by QCMC MIS
</div>

<script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>
{% endblock %}
