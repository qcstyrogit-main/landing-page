<section id="jobs" class="jobs-section" aria-labelledby="jobs-title">
    <div class="jobs-container">
        <!-- Left Text Column -->
        <div class="jobs-text">
            <p class="jobs-eyebrow">In Careers</p>
            <h2 id="jobs-title" class="jobs-title">Be Part of Our Team</h2>
            <p>
                Looking for a place where your skills can shine, your ideas matter, and your career can soar? 
                Explore exciting opportunities and become part of a team that's passionate, driven, and ready to make a difference.
            </p>
            
            <a href="{{ url_for('view_jobs') }}" class="view-jobs-btn">
                View Jobs
            </a>

        </div>

        <!-- Right Image Column -->
        <div class="jobs-image">
            <picture>
                <source type="image/avif" srcset="{{ url_for('static', filename='images/careers/team.avif') }}">
                <source type="image/webp" srcset="{{ url_for('static', filename='images/careers/team.webp') }}">
                <img loading="lazy" decoding="async" src="{{ url_for('static', filename='images/careers/team.png') }}" width="800" height="800" alt="QC & MC team">
            </picture>
        </div>
    </div>
</section>
