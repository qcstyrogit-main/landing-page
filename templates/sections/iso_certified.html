<section id="iso-certified" class="sustainability-layer fade-in-layer" aria-labelledby="iso-title">
    <div class="sustainability-text iso-card">
        <div class="iso-header">
            <span class="iso-chip">ISO</span>
            <span class="iso-kicker">Certified Quality Standards</span>
        </div>
        <h2 id="iso-title" class="iso-title">ISO Certified</h2>
        <p>Q.C. Styropackaging and Multiplast Corporation is proudly certified with ISO standards.</p>
        <div class="iso-divider" aria-hidden="true"></div>

        <div class="iso-images">
            <img loading="lazy" decoding="async" src="{{ url_for('static', filename='images/QC.png') }}" class="iso-logo" alt="QC logo">
            <img loading="lazy" decoding="async" src="{{ url_for('static', filename='images/certified.png') }}" class="iso-logo" alt="ISO certified">
            <img loading="lazy" decoding="async" src="{{ url_for('static', filename='images/MC.png') }}" class="iso-logo" alt="MC logo">
        </div>
    </div>
</section>
