<section id="contact-us" class="contact_us-section" aria-labelledby="contact-title">
    <div class="contact_us-content">

            <!-- Header -->
            <h1 id="contact-title" class="contact-header">Our Offices & Plants</h1>

            <!-- Area Filter -->
            <div class="area-filter">
                <label for="area">Select Area:</label>
                <select id="area">
                    <option value="all">All Areas</option>
                    <option value="luzon">Luzon</option>
                    <option value="visayas">Visayas</option>
                    <option value="mindanao">Mindanao</option>
                    <option value="plant">Plant</option>
                </select>
            </div>

            <div class="contact_mapboard">
                <div class="map_stage">
                    <img class="ph_map" src="{{ url_for('static', filename='images/philippines_map.svg') }}" alt="Map of the Philippines">
                    <div class="map_markers" id="contactMapMarkers"></div>
                </div>
                <div class="map_panel" id="contactDetailPanel">
                    <div class="map_panel-header">
                        <h2 id="contactPanelTitle">Select a location</h2>
                        <span id="contactPanelTag" class="contact_tag">-</span>
                    </div>
                    <div class="map_panel-body" id="contactPanelBody">
                        <p>Click a marker on the map to view office details.</p>
                    </div>
                    <div class="map_panel-map">
                        <iframe
                            id="contactPanelMap"
                            title="Selected location map"
                            src="https://www.google.com/maps?q=Philippines&output=embed"
                            loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"
                        ></iframe>
                    </div>
                    <a class="map_panel-link" id="contactPanelLink" href="#" target="_blank" rel="noopener">Open map</a>
                </div>
            </div>
           

            <!-- Message Us Button -->
            <div class="message-btn-container">
                <button type="button" class="message-btn" id="openContactPopup">
                    Message Us
                </button>
            </div>

            <!-- Overlay -->
            <div id="contactOverlay" class="contact-overlay" aria-hidden="true"></div>

            <!-- Popup -->
            <div id="contactPopup" class="contact-popup" role="dialog" aria-modal="true" aria-labelledby="contactPopupTitle" aria-hidden="true">
                <button type="button" class="contact-close" id="closeContactPopup" aria-label="Close contact form">&times;</button>

                <h3 id="contactPopupTitle">Contact Us</h3>

                <form id="contactForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input id="contactName" name="name" type="text" placeholder="Name" required>
                    <input id="contactCompany" name="company" type="text" placeholder="Company Name">
                    <input id="contactNo" name="contact_no" type="text" placeholder="Contact No.">
                    <input id="contactEmail" name="email" type="email" placeholder="Email" required>

                    <select id="contactTopic" name="topic" required>
                        <option value="">Select Topic</option>
                        <option>General Inquiry</option>
                        <option>Sales</option>
                        <option>Support</option>
                    </select>

                    <textarea
                        id="contactInquiry"
                        name="inquiry"
                        placeholder="Your Inquiry"
                        rows="4"
                        required
                    ></textarea>

                    <!-- Honeypot -->
                    <input type="text" id="contactHp" name="hp" style="display:none">

                    <button type="submit" class="submit-btn">
                        Send Message
                    </button>
                </form>
            </div>

            <!-- Success Popup -->
            <div id="contactSuccessPopup" class="contact-success-popup" aria-hidden="true">
                <div class="contact-success-card" role="dialog" aria-modal="true" aria-labelledby="contactSuccessTitle">
                    <button type="button" class="contact-success-close" aria-label="Close message">&times;</button>
                    <div class="contact-success-badge" aria-hidden="true">OK</div>
                    <h3 id="contactSuccessTitle">Message Sent</h3>
                    <p id="contactSuccessMessage">Your inquiry has been sent successfully.</p>
                </div>
            </div>

            <!-- Visit Us on Our Socials -->
            <div class="contact-socials">
                <h2>Visit Us on Our Socials</h2>
                <div class="social-icons">
                    <a href="https://www.facebook.com/people/QC-Styropackaging-and-Multiplast-Corporation/100063668176290/" target="_blank" rel="noopener noreferrer" class="social-link facebook">
                        <svg class="icon icon-lg" aria-hidden="true"><use href="#icon-facebook"></use></svg>
                    </a>
                    <!-- <a href="https://www.instagram.com/YourPage" target="_blank" rel="noopener noreferrer" class="social-link instagram">
                        <svg class="icon icon-lg" aria-hidden="true"><use href="#icon-instagram"></use></svg>
                    </a> -->
                    <a href="#" class="social-link viber" id="viberLink">
                        <svg class="icon icon-lg" aria-hidden="true"><use href="#icon-chat"></use></svg>
                    </a>
                </div>
            </div>

        </div>
    </section>

<!-- JS for Area Filter -->
<script src="{{ url_for('static', filename='js/contact_us.js') }}"></script>
