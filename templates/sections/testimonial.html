<section id="testimonial" class="testimonial-section" aria-labelledby="testimonial-title">
    <div class="testimonial-content">
        <div class="about-us-header">
            <p class="about-us-eyebrow">Testimonials</p>
            <h2 id="testimonial-title">What our employees say about us</h2>
            <p class="about-us-lede">Real feedback from the people who power QC &amp; MC.</p>
        </div>

        <div class="testimonial-card" role="group" aria-live="polite">
            <div class="testimonial-quote-mark" aria-hidden="true">“</div>
            <p class="testimonial-quote" id="testimonialQuote"></p>
            <div class="testimonial-footer">
                <div class="testimonial-user">
                    <div class="testimonial-avatar" id="testimonialAvatar" aria-hidden="true"></div>
                    <div>
                        <div class="testimonial-name" id="testimonialName"></div>
                        <div class="testimonial-role" id="testimonialRole"></div>
                    </div>
                </div>
                <div class="testimonial-rating" id="testimonialRating" aria-label="Rating"></div>
            </div>
        </div>

        <div class="testimonial-controls">
            <button type="button" class="testimonial-btn" id="testimonialPrev" aria-label="Previous testimonial">
                ‹
            </button>
            <button type="button" class="testimonial-btn" id="testimonialNext" aria-label="Next testimonial">
                ›
            </button>
        </div>
    </div>
