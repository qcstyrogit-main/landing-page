<section id="testimonial" class="testimonial-section" aria-labelledby="testimonial-title" data-api-base="{{ API_BASE_URL }}">
    <div class="testimonial-content">
        <div class="about-us-header">
            <p class="about-us-eyebrow">Testimonials</p>
            <h2 id="testimonial-title">What our employees say about us</h2>
            <p class="about-us-lede">Real feedback from the people who power QC &amp; MC.</p>
        </div>

        <div class="testimonial-card" role="group" aria-live="polite">
            <div class="testimonial-quote" id="testimonialQuote"></div>
            <button type="button" class="testimonial-fullscreen" id="testimonialFullscreen" aria-label="View full screen">
                <svg class="icon" aria-hidden="true"><use href="#icon-fullscreen"></use></svg>
            </button>
        </div>

        <div class="testimonial-modal" id="testimonialModal" aria-hidden="true" inert>
            <div class="testimonial-modal-card" role="dialog" aria-modal="true" aria-label="Testimonial image">
                <button type="button" class="testimonial-modal-close" id="testimonialModalClose" aria-label="Close">×</button>
                <img id="testimonialModalImage" alt="Testimonial image" loading="lazy">
            </div>
        </div>
    </div>
</section>

<script defer src="{{ url_for('static', filename='js/testimonial.js') }}"></script>
