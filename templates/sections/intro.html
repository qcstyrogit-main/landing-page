<section class="intro-section" id="intro" aria-labelledby="products-title">
    <div class="intro-content">
        <!-- Left Text Column -->
        <div class="intro-text">
            <h1 id="products-title">
                Continuous innovation that meets<br>
                World Class Standards
            </h1>
            <p>
                Discover the superior packaging solutions from QC Styropackaging, crafted to meet your every need, 
                and the wide array of reliable, high-quality offerings from Multiplast Corporation. 
                Your trusted partners in innovation and quality!
            </p>
        </div>

        <!-- Right Image Column -->
        <div class="intro-images">
            <picture>
                <source type="image/avif" srcset="{{ url_for('static', filename='images/products/Tray.avif') }}">

            <picture>

            </picture>
            <picture>
                <source type="image/avif" srcset="{{ url_for('static', filename='images/products/Hotdog_Boxes.avif') }}">

                <img src="{{ url_for('static', filename='images/products/Hotdog_Boxes.png') }}" loading="lazy" decoding="async" alt="Hotdog box products">

            </picture>
            <picture>
                <source type="image/avif" srcset="{{ url_for('static', filename='images/products/Plates.avif') }}">
                <source type="image/webp" srcset="{{ url_for('static', filename='images/products/Plates.webp') }}">
                <img src="{{ url_for('static', filename='images/products/Plates.png') }}" loading="lazy" decoding="async" alt="Plate products">
