<!-- Footer -->
<footer class="custom-footer">
    <div class="footer-content">
        <span>© Copyright 2025</span>
        <span class="footer-links">
            <button type="button" id="privacyLink" class="footer-link">Privacy Policy</button> |
            <button type="button" id="termofuseLink" class="footer-link">Terms of Use</button>
        </span>
    </div>
</footer>

<!-- Privacy Policy Modal -->
<div id="privacyModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="privacyModalTitle" aria-hidden="true" inert>
    <div class="modal-content">
        <button type="button" class="close" aria-label="Close privacy policy">&times;</button>
        <div class="modal-body">
            {% include "sections/privacy_policy.html" %}
        </div>
    </div>
</div>

<!-- Terms of Use Modal -->
<div id="termofuseModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="termsModalTitle" aria-hidden="true" inert>
    <div class="modal-content">
        <button type="button" class="close" aria-label="Close terms of use">&times;</button>
        <div class="modal-body">
            {% include "sections/term_of_use.html" %}
        </div>
    </div>
</div>

<script defer src="{{ url_for('static', filename='js/footer.js') }}"></script>
