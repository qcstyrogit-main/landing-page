<header class="home-header">
    <div class="brand">
        <picture>
            <source type="image/avif" srcset="{{ url_for('static', filename='images/QC.avif') }}">
            <source type="image/webp" srcset="{{ url_for('static', filename='images/QC.webp') }}">
            <img src="{{ url_for('static', filename='images/QC.png') }}" class="brand-logo" alt="QC Logo" width="45" height="45" decoding="async">
        </picture>
        <picture>
            <source type="image/avif" srcset="{{ url_for('static', filename='images/MC.avif') }}">
            <source type="image/webp" srcset="{{ url_for('static', filename='images/MC.webp') }}">
            <img src="{{ url_for('static', filename='images/MC.png') }}" class="brand-logo" alt="MC Logo" width="45" height="45" decoding="async">
        </picture>
    </div>

    <nav class="home-nav">
        <ul>
            <li><a href="/" {% if request.path == "/" %}aria-current="page"{% endif %}>Home</a></li>
            <li class="has-dropdown">
                <a href="/#products" aria-haspopup="true">Products</a>
                <ul class="dropdown-menu">
                    <li><a href="/products_plastic">Plasticware</a></li>
                    <li><a href="/products_styro">Styroware</a></li>
                </ul>
            </li>
            <li><a href="/#about-us">About</a></li>
            <li><a href="/#jobs">Careers</a></li>
            <li><a href="/#sustainability">Sustainability</a></li>
            <li><a href="/#testimonial">Testimonials</a></li>
            <li><a href="/#contact-us">Contact</a></li>
        </ul>
    </nav>

    <div class="header-tools">
        <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-controls="mobileNav" aria-expanded="false">&#9776;</button>
        <a href="/announcements" class="btn-announcement" data-erp-announcement aria-hidden="true" aria-label="Announcements">
            <svg class="icon" aria-hidden="true"><use href="#icon-bell"></use></svg>
        </a>
        <div class="user-menu" data-erp-user-menu>
            <a href="{{ API_BASE_URL }}" class="btn-login" data-erp-login="desktop" aria-label="Login">Login</a>
            <div class="user-menu-dropdown" aria-hidden="true">
                <a href="{{ API_BASE_URL.rstrip('/') }}/app" class="user-menu-item">Go to ERP</a>
            </div>
        </div>
    </div>
</header>

<!-- Mobile navigation (for small screens) -->
<nav id="mobileNav" class="mobile-nav" aria-hidden="true" inert>
    <a href="/" {% if request.path == "/" %}aria-current="page"{% endif %}>Home</a>
    <button type="button" id="mobileDropdownToggle" class="mobile-dropdown-toggle" aria-expanded="false" aria-haspopup="true" aria-controls="mobileDropdown">
        Products
        <svg class="icon" aria-hidden="true"><use href="#icon-chevron-down"></use></svg>
    </button>
    <div id="mobileDropdown" class="mobile-dropdown" aria-hidden="true" inert>
        <a href="/products_plastic">Plasticware</a>
        <a href="/products_styro">Styroware</a>
    </div>
    <a href="/#about-us">About</a>
    <a href="/#jobs">Careers</a>
    <a href="/#sustainability">Sustainability</a>
    <a href="/#testimonial">Testimonial</a>
    <a href="/#contact-us">Contact</a>
    <a href="/announcements" class="mobile-announcement" data-erp-announcement aria-hidden="true" aria-label="Announcements">
        <svg class="icon" aria-hidden="true"><use href="#icon-bell"></use></svg>
        <span>Announcement</span>
    </a>
    <a href="{{ API_BASE_URL }}" class="mobile-login" data-erp-login="mobile">Login</a>
</nav>
